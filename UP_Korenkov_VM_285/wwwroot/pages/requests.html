<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список заявок - Учёт заявок на ремонт</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/pages/requests.html">Ремонт климатического оборудования</a>
        </div>
        <ul class="nav-menu"></ul>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>Список заявок</h2>
                <div>
                    <button class="btn btn-success" id="createRequestBtn" style="display: none;">
                        + Создать заявку
                    </button>
                </div>
            </div>

            <div class="filters">
                <input type="text" id="searchInput" placeholder="Поиск по номеру, модели или описанию...">
                <select id="statusFilter">
                    <option value="">Все статусы</option>
                </select>
            </div>

            <div id="loading" class="loading">Загрузка заявок...</div>

            <div class="table-container" id="desktopTable" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>№</th>
                            <th>Дата</th>
                            <th>Тип оборудования</th>
                            <th>Модель</th>
                            <th>Статус</th>
                            <th>Заказчик</th>
                            <th>Специалист</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="requestsTableBody"></tbody>
                </table>
            </div>

            <div id="mobileCards" class="requests-grid" style="display: none;"></div>

            <div id="noRequests" class="alert alert-warning" style="display: none; text-align: center;">
                Заявок не найдено
            </div>
        </div>
    </div>

    <div id="assignMasterModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Назначить специалиста</h3>
                <span class="close-btn" onclick="closeModal('assignMasterModal')">&times;</span>
            </div>
            <form id="assignMasterForm">
                <input type="hidden" id="assignRequestId">
                <div class="form-group">
                    <label for="masterSelect">Выберите специалиста</label>
                    <select id="masterSelect" required>
                        <option value="">Загрузка...</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Назначить</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/requests.js"></script>
</body>
</html>
