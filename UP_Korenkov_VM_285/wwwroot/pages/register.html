<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация пользователя - Учёт заявок на ремонт</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">
            <a href="/pages/requests.html">Ремонт климатического оборудования</a>
        </div>
        <ul class="nav-menu"></ul>
    </nav>

    <div class="container">

        <button class="btn btn-secondary" onclick="goBack()" style="margin-bottom: 20px;">
            ← Назад к списку пользователей
        </button>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="card-header">
                <h2>Регистрация нового пользователя</h2>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="fullName">ФИО *</label>
                    <input type="text" id="fullName" class="form-control" required
                           placeholder="Иванов Иван Иванович">
                </div>

                <div class="form-group">
                    <label for="phone">Телефон *</label>
                    <input type="tel" id="phone" class="form-control" required
                           pattern="^[0-9+\-\s()]{10,20}$"
                           title="Введите корректный номер телефона"
                           placeholder="+7 (999) 123-45-67">
                </div>

                <div class="form-group">
                    <label for="login">Логин *</label>
                    <input type="text" id="login" class="form-control" required
                           placeholder="Введите уникальный логин">
                </div>

                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" class="form-control" required minlength="4">
                    <small class="form-text text-muted">Минимум 4 символа</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Подтвердите пароль *</label>
                    <input type="password" id="confirmPassword" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="roleId">Роль *</label>
                    <select id="roleId" class="form-control" required>
                        <option value="">Выберите роль</option>
                    </select>
                </div>

                <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>

                <button type="submit" class="btn btn-primary">Создать пользователя</button>
                <button type="button" class="btn btn-secondary" onclick="goBack()">Отмена</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/register.js"></script>
</body>
</html>
