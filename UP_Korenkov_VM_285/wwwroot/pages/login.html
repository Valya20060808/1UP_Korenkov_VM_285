<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - Учёт заявок на ремонт</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card" style="max-width: 400px; width: 100%;">
            <div class="card-header">
                <h2 style="color: #667eea; text-align: center; width: 100%;">Вход в систему</h2>
            </div>

            <div class="alert alert-danger" id="error-message" style="display: none;"></div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login">Логин</label>
                    <input type="text" id="login" name="login" required
                           placeholder="Введите ваш логин">
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Введите ваш пароль">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Войти
                </button>
            </form>

            <div style="margin-top: 20px; text-align: center; color: #999; font-size: 0.9rem;">
                <p>Тестовые учётные данные:</p>
                <p>Менеджер: login1 / pass1</p>
                <p>Специалист: login2 / pass2</p>
                <p>Оператор: login4 / pass4</p>
                <p>Заказчик: login6 / pass6</p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        checkLoggedIn();
    </script>
</body>
</html>
